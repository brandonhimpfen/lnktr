title: LNKTR
description: The Only Link You’ll Ever Need
url: "https://lnktr.net"
baseurl: ""
plugins:
  - jekyll-feed
  - jekyll-sitemap
google_analytics: G-QFFQNW3HTS
include:
 - _posts
 - _pages
collections:
  pages:
    output: true
    permalink: /:name/
  posts:
    output: true
    permalink: /:slug
defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"      
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
